<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netplan Config Creator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;700&family=Red+Hat+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; }
    body {
      background-color: #1e1e2f;
      color: #e0e0e0;
      font-family: monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* === Carino Systems Header === */
    .cs-header {
      height: 70px; flex-shrink: 0;
      background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%);
      border-bottom: 1px solid #262626;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; gap: 12px; z-index: 10;
      font-family: 'IBM Plex Sans', sans-serif;
    }
    .cs-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex-shrink: 0; }
    .cs-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .cs-page-name {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.4rem; font-weight: 900; line-height: 1;
      background: linear-gradient(130deg, #fef08a 0%, #eab308 50%, #b45309 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      white-space: nowrap;
    }
    .cs-info { display: flex; align-items: baseline; gap: 10px; border-left: 1px solid #262626; padding-left: 14px; }
    .cs-info-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 700; color: #fff; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em; }
    .cs-info-desc { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: #666; white-space: nowrap; }
    .cs-icon-btn {
      width: 32px; height: 32px; border: 1px solid #262626; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: #666; transition: 0.2s; text-decoration: none; background: transparent !important; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 700;
      padding: 0 !important;
    }
    .cs-icon-btn:hover { border-color: #eab308 !important; color: #050505 !important; background: #eab308 !important; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(234,179,8,0.15); }
    .cs-icon-btn svg { width: 15px; height: 15px; }
    .cs-vdiv { width: 1px; height: 22px; background: #262626; flex-shrink: 0; }
    .cs-select {
      background: transparent !important; border: 1px solid #262626 !important; color: #a3a3a3 !important;
      font-family: 'IBM Plex Mono', monospace !important; font-size: 0.65rem !important;
      padding: 0 8px !important; height: 32px; border-radius: 4px !important; cursor: pointer; outline: none;
      transition: 0.2s; width: auto !important;
    }
    .cs-select:hover, .cs-select:focus { border-color: #eab308 !important; }
    .cs-select option { background: #111; color: #fff; }
    .cs-btn {
      display: flex !important; align-items: center !important;
      background: transparent !important; border: 1px solid #262626 !important;
      color: #a3a3a3 !important; font-family: 'IBM Plex Mono', monospace !important;
      font-size: 0.65rem !important; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0 10px !important; height: 32px !important; border-radius: 4px !important;
      cursor: pointer; transition: 0.2s; white-space: nowrap;
    }
    .cs-btn:hover { border-color: #eab308 !important; color: #eab308 !important; background: rgba(234,179,8,0.05) !important; }

    .layout { padding: 1rem; }
    .layout {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .editor-section {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      max-height: 80vh; /* Add this line */
      overflow: hidden;  /* Prevent overflow from expanding the layout */
    }

    .editor-section, .modules-section {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
    }
    .CodeMirror {
      flex: 1;
      height: 100%;
      overflow: auto;
    }
    .CodeMirror-scroll {
      overflow-y: auto !important;
    }
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    select, button {
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #2d3748;
      color: #e0e0e0;
      cursor: pointer;
    }
    button:hover {
      background-color: #4a5568;
    }
    .error {
      color: #ff6b6b;
      background: #2c1e1e;
      padding: 0.75rem;
      border: 1px solid #ff6b6b;
      margin-top: 1rem;
      border-radius: 6px;
    }
    .success {
      color: #38c172;
      background: #1e2e1e;
      padding: 0.75rem;
      border: 1px solid #38c172;
      margin-top: 1rem;
      border-radius: 6px;
    }
    .module-button {
      display: block;
      width: 100%;
      margin-bottom: 0.5rem;
      background-color: #394867;
    }
    .module-button.active {
      background-color: #2b6cb0;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header class="cs-header">
  <div class="cs-left">
    <a href="https://carino.systems" class="cs-icon-btn" title="Carino Systems">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </a>
    <span class="cs-page-name">NetplanConfig</span>
    <div class="cs-info">
      <span class="cs-info-title">Netplan Config Creator</span>
      <span class="cs-info-desc">YAML Network Configuration Generator</span>
    </div>
  </div>
  <div class="cs-right">
    <select id="templateSelector" class="cs-select">
      <option value="full">Full Showcase</option>
      <option value="simple">Simple Showcase</option>
    </select>
    <div class="cs-vdiv"></div>
    <button onclick="validateYaml()" class="cs-btn">Validate</button>
    <button onclick="copyToClipboard()" class="cs-btn">Copy</button>
    <button onclick="downloadYaml()" class="cs-btn">Download</button>
    <div class="cs-vdiv"></div>
    <a href="https://github.com/MiguelCarino" target="_blank" class="cs-icon-btn" title="GitHub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
    </a>
    <a href="https://www.linkedin.com/in/miguelcarino94/" target="_blank" class="cs-icon-btn" title="LinkedIn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
    </a>
  </div>
</header>

<div class="layout">
  <div class="editor-section">
    <textarea id="yamlEditor"></textarea>
    <div id="errorBox" class="error" style="display: none;"></div>
    <div id="successBox" class="success" style="display: none;">✔ No problems found.</div>
  </div>
  <div class="modules-section">
    <h3>📦 Netplan Modules</h3>
    <button class="module-button active" data-type="ethernets" onclick="toggleModule(this)">Ethernets</button>
    <button class="module-button active" data-type="wifis" onclick="toggleModule(this)">Wi-Fi</button>
    <button class="module-button active" data-type="bridges" onclick="toggleModule(this)">Bridge</button>
    <button class="module-button active" data-type="vlans" onclick="toggleModule(this)">VLAN</button>
    <button class="module-button active" data-type="bonds" onclick="toggleModule(this)">Bond</button>
    <button class="module-button active" data-type="tunnels" onclick="toggleModule(this)">Tunnels</button>
    <button class="module-button active" data-type="macvlans" onclick="toggleModule(this)">MACVLAN</button>
    <button class="module-button active" data-type="veth" onclick="toggleModule(this)">Veth</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/yaml/yaml.min.js"></script>

<script>
  const baseTemplate = `# Netplan configuration file
# This file defines network interfaces using Netplan.
# Steps to apply:
# 1. Run 'sudo netplan generate' to convert to backend configs.
# 2. Run 'sudo netplan try' to test it interactively (auto rollback if it fails).
# 3. If it works, run 'sudo netplan apply' to make it permanent.
network:
  version: 2
  renderer: networkd
`;

 const snippetsFull = {
  ethernets: `  # Static Ethernet interface
  ethernets:
    eth0:
      match:
        macaddress: "00:11:22:33:44:55"  # Ensures correct device
      set-name: lan0                     # Renames device for clarity
      mtu: 1500                          # Optional: set MTU
      dhcp4: no
      addresses: [192.168.1.10/24]
      gateway4: 192.168.1.1
      nameservers:
        addresses: [8.8.8.8, 8.8.4.4]
        search: [example.local]
      # dhcp6: no
      # optional: true
`,

  wifis: `  # Wi-Fi interface with access point credentials
  wifis:
    wlan0:
      access-points:
        "MyWiFi":
          password: "mypassword"         # WPA2 password
      dhcp4: true
      # dhcp6: false
      # optional: true
`,

  bridges: `  # Bridge interface combining eth0 and eth1
  bridges:
    br0:
      interfaces: [eth0, eth1]
      addresses: [192.168.1.5/24]
      gateway4: 192.168.1.1
      nameservers:
        addresses: [1.1.1.1, 9.9.9.9]
      parameters:
        stp: true                        # Enable Spanning Tree Protocol
        forward-delay: 4
      # optional: true
`,

  vlans: `  # VLAN interface (802.1Q tag 100)
  vlans:
    vlan100:
      id: 100
      link: eth0                         # Parent interface
      addresses: [192.168.100.2/24]
      mtu: 1450
`,

  bonds: `  # Bonded (aggregated) interface
  bonds:
    bond0:
      interfaces: [eth0, eth1]
      mode: active-backup               # Other options: balance-rr, 802.3ad
      dhcp4: true
      # transmit-hash-policy: layer2
      # mii-monitor-interval: 100
`,

  tunnels: `  # GRE tunnel interface
  tunnels:
    gre1:
      mode: gre
      local: 192.168.1.10
      remote: 192.168.2.10
      addresses: [10.1.1.1/30]
      ttl: 64
      # key: 123
`,

  macvlans: `  # MACVLAN interface (for containers or isolation)
  macvlans:
    macvlan0:
      link: eth0
      mode: bridge                       # Other options: vepa, private
      addresses: [192.168.1.20/24]
`,

  veth: `  # Virtual Ethernet (veth) pair, often for containers
  veth:
    veth-host:
      peer: veth-peer
      addresses: [169.254.1.1/30]
`,
};


  const snippetsSimple = {
  ethernets: `  # Basic DHCP ethernet
  ethernets:
    eth0:
      dhcp4: true
`,

  wifis: `  # Minimal Wi-Fi setup with DHCP
  wifis:
    wlan0:
      access-points:
        "SSID":
          password: "password"
      dhcp4: true
`,

  bridges: `  # Simple bridge with DHCP
  bridges:
    br0:
      interfaces: [eth0, eth1]
      dhcp4: true
`,

  vlans: `  # Basic VLAN with DHCP
  vlans:
    vlan100:
      id: 100
      link: eth0
      dhcp4: true
`,

  bonds: `  # Simple bond using DHCP
  bonds:
    bond0:
      interfaces: [eth0, eth1]
      dhcp4: true
`,

  tunnels: `  # Simple GRE tunnel
  tunnels:
    gre1:
      mode: gre
      local: 192.168.1.1
      remote: 192.168.2.1
      addresses: [10.0.0.1/30]
`,

  macvlans: `  # MACVLAN with DHCP
  macvlans:
    macvlan0:
      link: eth0
      mode: bridge
      dhcp4: true
`,

  veth: `  # Minimal veth pair
  veth:
    veth-host:
      peer: veth-peer
      addresses: [169.254.1.1/30]
`
};


  let moduleSnippets = { ...snippetsFull };

  const editor = CodeMirror.fromTextArea(document.getElementById("yamlEditor"), {
    mode: "yaml",
    theme: "default",
    lineNumbers: true,
    lineWrapping: true
  });

  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");
  const templateSelector = document.getElementById("templateSelector");

  templateSelector.addEventListener("change", () => {
    moduleSnippets = templateSelector.value === "simple" ? snippetsSimple : snippetsFull;
    rebuildYamlFromModules();
  });

  function rebuildYamlFromModules() {
    let fullYaml = baseTemplate;
    document.querySelectorAll('.module-button.active').forEach(btn => {
      fullYaml += moduleSnippets[btn.dataset.type] + '\n';
    });
    editor.setValue(fullYaml);
    errorBox.style.display = "none";
    successBox.style.display = "none";
  }

  function toggleModule(button) {
    button.classList.toggle("active");
    rebuildYamlFromModules();
  }

  function validateYaml() {
    try {
      const content = editor.getValue();
      jsyaml.load(content);
      errorBox.style.display = "none";
      successBox.style.display = "block";
    } catch (e) {
      successBox.style.display = "none";
      errorBox.style.display = "block";
      errorBox.textContent = `YAML Error: ${e.message}`;
    }
  }

  function copyToClipboard() {
    navigator.clipboard.writeText(editor.getValue());
  }

  function downloadYaml() {
    const blob = new Blob([editor.getValue()], { type: 'text/yaml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'netplan-config.yaml';
    a.click();
    URL.revokeObjectURL(url);
  }

  rebuildYamlFromModules();
</script>

</body>
</html>
